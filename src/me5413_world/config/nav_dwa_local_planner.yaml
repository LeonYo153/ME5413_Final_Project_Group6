DWAPlannerROS:
  max_vel_x: 2.50
  min_vel_x: -0.20
  max_vel_y: 0.0
  min_vel_y: 0.0

  max_vel_trans: 2.50
  min_vel_trans: 0.08

  max_vel_theta: 2.00
  min_vel_theta: 0.25

  acc_lim_x: 10.0
  acc_lim_y: 0.0
  acc_lim_theta: 5.0

  yaw_goal_tolerance: 0.10
  xy_goal_tolerance: 0.45
  latch_xy_goal_tolerance: false

  sim_time: 1.0
  sim_granularity: 0.05
  angular_sim_granularity: 0.10
  vx_samples: 40
  vy_samples: 1
  vth_samples: 20

  path_distance_bias: 40.0
  goal_distance_bias: 20.0
  occdist_scale: 0.15
  forward_point_distance: 0.25
  stop_time_buffer: 0.20
  scaling_speed: 0.25
  max_scaling_factor: 0.20

  oscillation_reset_dist: 0.10
  publish_traj_pc: true
  publish_cost_grid_pc: true