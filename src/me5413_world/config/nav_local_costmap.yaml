local_costmap:
  global_frame: odom
  robot_base_frame: base_link
  transform_tolerance: 0.5

  update_frequency: 8.0
  publish_frequency: 4.0

  static_map: false
  rolling_window: true
  width: 6.0
  height: 6.0
  resolution: 0.05
  track_unknown_space: false

  plugins:
    - {name: obstacle_layer, type: "costmap_2d::ObstacleLayer"}
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}

  obstacle_layer:
    observation_sources: front_scan predicted_cloud blocked_gap_cloud
    front_scan:
      data_type: LaserScan
      topic: /front/scan
      marking: true
      clearing: true
      inf_is_valid: true
    predicted_cloud:
      data_type: PointCloud2
      topic: /me5413_world/predicted_obstacle_cloud
      marking: true
      clearing: false
      obstacle_range: 6.0
      observation_persistence: 0.4
      expected_update_rate: 0.0
    blocked_gap_cloud:
      data_type: PointCloud2
      topic: /me5413_world/blocked_gap_cloud
      marking: true
      clearing: false
      obstacle_range: 8.0
      observation_persistence: 10.0
      expected_update_rate: 0.0

  inflation_layer:
    inflation_radius: 2.0
    cost_scaling_factor: 1.50
